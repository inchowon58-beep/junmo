name: SEO Rankings (morning)

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check-rankings:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ranking check
        run: |
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://demolishzone.yourdogzone.co.kr/api/cron/seo-rankings"
